<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design your knight</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>

    <form>
        <legend>Equipment</legend>

        <details>
            <summary>Helmet</summary>
            <ul>
                <li>
                    <input type="radio" name="helmet" id="helm-none" hidden checked>
                    <label for="helm-none">No Helmet</label>
                </li>
                <li>
                    <input type="radio" name="helmet" id="helm-addy" hidden>
                    <label for="helm-addy">
                        <img src="/imgs/helm/helm-addy.png" alt="Adamant Helmet"> Adamant Helm
                    </label>
                </li>
                <li>
                    <input type="radio" name="helmet" id="helm-rune" hidden>
                    <label for="helm-rune">
                        <img src="/imgs/helm/helm-rune.png" alt="Rune Helm"> Rune Helm
                    </label>
                </li>
                <li>
                    <input type="radio" name="helmet" id="helm-dragon" hidden>
                    <label for="helm-dragon">
                        <img src="/imgs/helm/helm-dragon.png" alt="Dragon Helm"> Dragon Helm
                    </label>
                </li>
            </ul>
        </details>

        <details>
            <summary>Platebody</summary>
            <ul>
                <li>
                    <input type="radio" name="body" id="body-none" hidden checked>
                    <label for="body-none">No Body</label>
                </li>
                <li>
                    <input type="radio" name="body" id="body-addy" hidden>
                    <label for="body-addy">
                        <img src="/imgs/body/body-addy.png" alt="Adamant Platebody"> Adamant Platebody
                    </label>
                </li>
                <li>
                    <input type="radio" name="body" id="body-rune" hidden>
                    <label for="body-rune">
                        <img src="/imgs/body/body-rune.png" alt="Rune Platebody"> Rune Platebody
                    </label>
                </li>
                <li>
                    <input type="radio" name="body" id="body-dragon" hidden>
                    <label for="body-dragon">
                        <img src="/imgs/body/body-dragon.png" alt="Dragon Platebody"> Dragon Platebody
                    </label>
                </li>
            </ul>
        </details>

        <details>
            <summary>Legs</summary>
            <ul>
                <li>
                    <input type="radio" name="legs" id="legs-none" hidden checked>
                    <label for="legs-none">No Legs</label>
                </li>
                <li>
                    <input type="radio" name="legs" id="legs-addy" hidden>
                    <label for="legs-addy">
                        <img src="/imgs/legs/legs-addy.png" alt="Adamant Platelegs"> Adamant Platelegs
                    </label>
                </li>
                <li>
                    <input type="radio" name="legs" id="legs-rune" hidden>
                    <label for="legs-rune">
                        <img src="/imgs/legs/legs-rune.png" alt="Rune Platelegs"> Rune Platelegs
                    </label>
                </li>
                <li>
                    <input type="radio" name="legs" id="legs-dragon" hidden>
                    <label for="legs-dragon">
                        <img src="/imgs/legs/legs-dragon.png" alt="Dragon Platelegs"> Dragon Platelegs
                    </label>
                </li>
            </ul>
        </details>

        <details>
            <summary>Boots</summary>
            <ul>
                <li>
                    <input type="radio" name="boots" id="boots-none" hidden checked>
                    <label for="boots-none">No Boots</label>
                </li>
                <li>
                    <input type="radio" name="boots" id="boots-addy" hidden>
                    <label for="boots-addy">
                        <img src="/imgs/boots/boot-addy.png" alt="Adamant boots"> Adamant Boots
                    </label>
                </li>
                <li>
                    <input type="radio" name="boots" id="boots-rune" hidden>
                    <label for="boots-rune">
                        <img src="/imgs/boots/boot-rune.png" alt="Rune boots"> Rune Boots
                    </label>
                </li>
                <li>
                    <input type="radio" name="boots" id="boots-dragon" hidden>
                    <label for="boots-dragon">
                        <img src="/imgs/boots/boot-dragon.png" alt="Dragon boots"> Dragon Boots
                    </label>
                </li>
            </ul>
        </details>
    </form>

    <section id="character">
        <!-- Base character layer -->
        <div class="character-wrap">
            <img src="/imgs/Plain_clothing_(male).png" alt="Knight base" id="base">

            <!-- Helmet layers -->
            <img src="/imgs/helm/helm-equiped-addy.png" id="helm-addy-preview" class="helm-layer" alt="">
            <img src="/imgs/helm/helm-equiped-rune.png" id="helm-rune-preview" class="helm-layer" alt="">
            <img src="/imgs/helm/helm-equiped-dragon.png" id="helm-dragon-preview" class="helm-layer" alt="">

            <!-- Body layers -->
            <img src="/imgs/body/body-equiped-addy.png" id="body-addy-preview" class="body-layer" alt="">
            <img src="/imgs/body/body-rune-equiped.png" id="body-rune-preview" class="body-layer" alt="">
            <img src="/imgs/body/body-dragon-equiped.png" id="body-dragon-preview" class="body-layer" alt="">

            <!-- Legs layers -->
            <img src="/imgs/legs/legs-equiped-addy.png" id="legs-addy-preview" class="legs-layer" alt="">
            <img src="/imgs/legs/legs-equped-rune.png" id="legs-rune-preview" class="legs-layer" alt="">
            <img src="/imgs/legs/legs-equped-dragon.png" id="legs-dragon-preview" class="legs-layer" alt="">

            <!-- Boots layers -->
            <img src="/imgs/boots/boot-equiped-addy.png" id="boots-addy-preview" class="boots-layer" alt="">

            <img src="/imgs/boots/boot-equiped-rune.png" id="boots-rune-preview" class="boots-layer" alt="">
            <img src="/imgs/boots/boot-equiped-dragon.png" id="boots-dragon-preview" class="boots-layer" alt="">

            <!-- Shadow -->
            <div class="shadow"></div>
        </div>
    </section>

</body>

</html>
